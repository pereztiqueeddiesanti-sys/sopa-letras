<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Word Search</title>
    <link rel="stylesheet" href="Sopa.css">
</head>
<body>

<h1 class="titulo">Word Search</h1>

<div class="contenedor">

    <!-- GRID -->
    <div id="grid" class="grid"></div>

    <!-- LISTA DERECHA -->
    <div class="panel">
        <ul>
            <li class="word" data-word="ONE">- ONE <span></span></li>
            <li class="word" data-word="TWO">- TWO <span></span></li>
            <li class="word" data-word="THREE">- THREE <span></span></li>
            <li class="word" data-word="RED">- RED <span></span></li>
            <li class="word" data-word="BLUE">- BLUE <span></span></li>
            <li class="word" data-word="GREEN">- GREEN <span></span></li>
            <li class="word" data-word="OPEN">- OPEN <span></span></li>
            <li class="word" data-word="CLOSE">- CLOSE <span></span></li>
            <li class="word" data-word="WRITE">- WRITE <span></span></li>
        </ul>

        <br>
        <input type="color" id="colorPicker" value="#ffcc00">
    </div>

</div>

<script src="Sopa.js"></script>
</body>
</html>
